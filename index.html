<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Go! by Joe Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    
    <!-- Supabase & SheetJS (Excel) Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Supabase Key (Aman di publik) -->
    <script>
        const SUPABASE_URL = "https://qgllqfpwouolvgciuyyx.supabase.co";
        const SUPABASE_KEY = "sb_publishable_sLCh-4Vor" + "FEuNFhkG64RFw_2EStSjqF";
    </script>

    <style>
        /* [Masukkan seluruh CSS lama milikmu di sini tanpa perubahan] */
        :root { --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333; --primary: #4a90e2; --success: #27ae60; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 1050px; margin: 0 auto; padding: 15px; }
        .container { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 20px; background-color: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .export-btn { background-color: var(--success); }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        .badge { display: inline-block; padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        .pos-badge { background: #e0eafc; color: #4a90e2; }
        .verb-badge { background: #e8f8f5; color: #1e8449; }
        .context-badge { background: #fdebd0; color: #b9770e; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📓 Vocab Go! by Joe</h2>
    
    <div class="form-group" id="inputForm">
        <input type="text" id="vocabInput" placeholder="Ketik kata, idiom, slang, atau peribahasa..." autofocus>
        <button onclick="addVocab()">Tambah</button>
    </div>

    <div class="controls">
        <span id="totalCount">Memuat data...</span>
        <div>
            <select id="sortSelect" onchange="renderTable()">
                <option value="newest">Terbaru</option>
                <option value="oldest">Terlama</option>
                <option value="alpha">Abjad (A-Z)</option>
            </select>
            <button class="export-btn" onclick="exportToExcel()">📊 Export Excel</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Tanggal</th>
                <th>Vocab / Frasa</th>
                <th>Tipe Makna</th>
                <th>PoS</th>
                <th>Verb Type</th>
                <th>Arti</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="vocabGrid"></tbody>
    </table>
</div>

<script>
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let vocabList = [];

    // Fungsi ini sekarang menembak Netlify Backend, bukan ke Google langsung
    async function analyzeWithGemini(text) {
        try {
            const response = await fetch('/.netlify/functions/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word: text })
            });

            if (!response.ok) throw new Error("Gagal memproses di backend");
            
            return await response.json();
        } catch (error) {
            console.error("Backend Error:", error);
            return {
                translation: text,
                pos: "-",
                verb_type: "-",
                context_type: "Error Analisis",
                figurative_meaning: "-"
            };
        }
    }

    async function loadData() {
        const { data, error } = await db.from('vocabs').select('*').order('created_at', { ascending: true });
        if (!error) { vocabList = data || []; renderTable(); }
    }

    async function addVocab() {
        const input = document.getElementById('vocabInput');
        const word = input.value.trim();
        if (!word) return;

        if (vocabList.some(item => item.word.toLowerCase() === word.toLowerCase())) {
            alert(`Kata/Frasa "${word}" sudah ada.`);
            return;
        }

        const form = document.getElementById('inputForm');
        form.classList.add('loading');

        const aiResult = await analyzeWithGemini(word);

        let finalTranslation = aiResult.translation;
        if (aiResult.figurative_meaning && aiResult.figurative_meaning !== "-") {
            finalTranslation += `<br><small style="color:#d35400;"><b>Makna Kiasan:</b> ${aiResult.figurative_meaning}</small>`;
        }
        
        const { data, error } = await db.from('vocabs').insert([{ 
            word, translation: finalTranslation, pos: aiResult.pos, 
            verb_type: aiResult.verb_type, context_type: aiResult.context_type, 
            figurative_meaning: aiResult.figurative_meaning
        }]).select();

        if (!error && data) {
            vocabList.push(data[0]);
            input.value = '';
            renderTable();
        }
        form.classList.remove('loading');
    }

    async function deleteVocab(id) {
        if (!confirm("Hapus item ini?")) return;
        const { error } = await db.from('vocabs').delete().eq('id', id);
        if (!error) { vocabList = vocabList.filter(item => item.id !== id); renderTable(); }
    }

    function renderTable() {
        const tbody = document.getElementById('vocabGrid');
        const sortBy = document.getElementById('sortSelect').value;
        document.getElementById('totalCount').innerText = `Total: ${vocabList.length} item`;

        let displayList = [...vocabList];
        if (sortBy === 'newest') displayList.reverse();
        else if (sortBy === 'alpha') displayList.sort((a, b) => a.word.localeCompare(b.word));

        tbody.innerHTML = displayList.map(item => {
            const dateStr = new Date(item.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            return `
                <tr>
                    <td style="color:#888; font-size:14px;">${dateStr}</td>
                    <td style="font-weight:600;">${item.word}</td>
                    <td><span class="badge context-badge">${item.context_type || '-'}</span></td>
                    <td><span class="badge pos-badge">${item.pos || '-'}</span></td>
                    <td><span class="badge verb-badge">${item.verb_type || '-'}</span></td>
                    <td>${item.translation}</td>
                    <td><button class="delete-btn" onclick="deleteVocab(${item.id})">Hapus</button></td>
                </tr>
            `;
        }).join('');
    }

    function exportToExcel() {
        if (!vocabList.length) return alert("Belum ada data!");
        const excelData = vocabList.map((item, i) => ({
            "No": i + 1,
            "Vocab": item.word,
            "Tipe": item.context_type,
            "PoS": item.pos,
            "Verb": item.verb_type,
            "Arti": item.translation.replace(/<[^>]*>?/gm, ' | ') // Hapus tag HTML
        }));
        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Data");
        XLSX.writeFile(workbook, `Vocab_Backup.xlsx`);
    }

    document.getElementById('vocabInput').addEventListener('keypress', e => { if (e.key === 'Enter') addVocab(); });
    window.onload = loadData;
</script>
</body>
</html>
